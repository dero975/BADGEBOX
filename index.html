<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timbratura</title>
    <style>
      body {
        background-color: #1e293b;
        font-family: Arial, sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background-color: #0f172a;
        padding: 20px;
        border-radius: 15px;
        width: 360px;
        text-align: center;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      }
      input#pinInput {
        width: 150px;
        margin: 0 auto 15px auto;
        padding: 10px;
        font-size: 24px;
        border-radius: 8px;
        border: none;
        text-align: center;
        letter-spacing: normal;
        user-select: none;
        color: #000000;
        background: white;
      }
      #status {
        display: none;
        margin-bottom: 15px;
        background-color: #374151;
        padding: 10px;
        border-radius: 8px;
        min-height: 50px;
        font-weight: bold;
      }
      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 15px;
        width: 100%;
      }
      button.key {
        background-color: #374151;
        border: 1.5px solid #ccc;
        border-radius: 50%;
        color: white;
        font-size: 36px;
        width: 70px;
        height: 70px;
        cursor: pointer;
        user-select: none;
        transition: background-color 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-sizing: border-box;
      }
      button.key:hover {
        background-color: #4b5563;
      }
      .actions {
        display: flex;
        justify-content: space-between;
      }
      button.action-btn {
        flex: 1;
        margin: 0 5px;
        padding: 12px 0;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        user-select: none;
        transition: background-color 0.3s ease;
        color: white;
      }
      button.action-btn.entrata {
        background-color: #22c55e;
      }
      button.action-btn.entrata:hover {
        background-color: #16a34a;
      }
      button.action-btn.uscita {
        background-color: #ef4444;
      }
      button.action-btn.uscita:hover {
        background-color: #b91c1c;
      }
      #dataOra {
        margin-bottom: 15px;
        font-weight: bold;
        font-size: 16px;
      }
    </style>

    <!-- Luxon -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
    <!-- Supabase -->
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      window.supabase = createClient(
        "https://pylfpqitdogatlsndxtf.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bGZwcWl0ZG9nYXRsc25keHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzNzU5OTcsImV4cCI6MjA2Mzk1MTk5N30.GXWmglDP7WcLSozta8UT6Ktd9XzIXSCxC5pJ4oWX3LU",
      );
    </script>
  </head>
  <body>
    <div class="container">
      <h1>BADGEBOX</h1>
      <div id="dataOra"></div>
      <input
        type="text"
        id="pinInput"
        placeholder="Inserisci PIN"
        readonly
        maxlength="2"
      />
      <div id="status"></div>
      <div class="keypad">
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>
        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>
        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>
        <button class="key">C</button>
        <button class="key">0</button>
        <button class="key">&larr;</button>
      </div>
      <div class="actions">
        <button class="action-btn entrata" id="btnEntrata">Entrata</button>
        <button class="action-btn uscita" id="btnUscita">Uscita</button>
      </div>
    </div>

    <script type="module">
      const { DateTime } = luxon;
      const supabase = window.supabase;
      const statusEl = document.getElementById("status");
      let statusTimeoutId = null;

      function capitalizzaTitolo(testo) {
        return testo.replace(/\b\w/g, (c) => c.toUpperCase());
      }

      function aggiornaDataOra() {
        const dataOraEl = document.getElementById("dataOra");
        const now = new Date();

        const optionsData = { weekday: "long", day: "numeric", month: "long" };
        let dataFormattata = now.toLocaleDateString("it-IT", optionsData);
        dataFormattata = capitalizzaTitolo(dataFormattata);

        const optionsOra = { hour: "2-digit", minute: "2-digit" };
        const oraFormattata = now.toLocaleTimeString("it-IT", optionsOra);

        dataOraEl.innerHTML = `${dataFormattata} <br> ${oraFormattata}`;
      }
      setInterval(aggiornaDataOra, 1000);
      aggiornaDataOra();

      // Gestione tastierino numerico per aggiornare il campo PIN
      const pinInput = document.getElementById("pinInput");
      document.querySelectorAll(".key").forEach((btn) => {
        btn.addEventListener("click", () => {
          const val = btn.textContent.trim();
          if (val === "C") {
            pinInput.value = "";
          } else if (val === "←") {
            pinInput.value = pinInput.value.slice(0, -1);
          } else if (pinInput.value.length < 2 && !isNaN(val)) {
            pinInput.value += val;
          }
        });
      });

      // Funzione per mostrare e nascondere messaggio stato
      function mostraMessaggio(testo) {
        statusEl.textContent = testo;
        statusEl.style.display = "block";

        if (statusTimeoutId) clearTimeout(statusTimeoutId);
        statusTimeoutId = setTimeout(() => {
          statusEl.style.display = "none";
          statusEl.textContent = "";
          statusTimeoutId = null;
        }, 6000);
      }

      // Funzione per verificare se PIN esiste in tabella utenti
      async function verificaPin(pin) {
        if (!pin) return null;
        const { data, error } = await supabase
          .from("utenti")
          .select("id, nome, cognome")
          .eq("pin", pin)
          .limit(1)
          .maybeSingle();
        if (error) {
          console.error("Errore verifica PIN:", error);
          return null;
        }
        return data;
      }

      // Funzione per verificare ultima timbratura per questo PIN
      async function ultimaTimbratura(pin) {
        const { data, error } = await supabase
          .from("timbrature")
          .select("*")
          .eq("pin", pin)
          .order("id", { ascending: false })
          .limit(1)
          .maybeSingle();
        if (error) {
          console.error("Errore caricamento ultima timbratura:", error);
          return null;
        }
        return data;
      }

      // Funzione per calcolare il giorno logico in base all'ora (esempio: se ora < 5 allora il giorno logico è il giorno precedente)
      function calcolaGiornoLogico(data, ora) {
        const dtData = DateTime.fromISO(data);
        const [h, m, s] = ora.split(":").map(Number);
        if (h < 5) {
          return dtData.minus({ days: 1 }).toISODate();
        }
        return dtData.toISODate();
      }

      // Funzione per inserire una nuova timbratura
      async function inserisciTimbratura(pin, tipo) {
        const ora = DateTime.now().toFormat("HH:mm:ss");
        const data = DateTime.now().toISODate();

        const utente = await verificaPin(pin);
        if (!utente) {
          mostraMessaggio("PIN non valido!");
          return;
        }

        const ultima = await ultimaTimbratura(pin);
        if (ultima && ultima.tipo === tipo) {
          mostraMessaggio(`Errore: già registrata una ${tipo} consecutiva.`);
          return;
        }

        // Calcolo giorno logico
        const giornoLogico = calcolaGiornoLogico(data, ora);

        const { error } = await supabase
          .from("timbrature")
          .insert([
            {
              pin,
              nome: utente.nome,
              cognome: utente.cognome,
              tipo,
              ora,
              data,
              giornologico: giornoLogico,
            },
          ]);

        if (error) {
          console.error("Errore inserimento timbratura:", error);
          mostraMessaggio("Errore inserimento timbratura");
          return;
        }

        mostraMessaggio(
          `✅ ${utente.nome} ${utente.cognome} ${tipo.toUpperCase()} registrata alle ${ora}`,
        );
        pinInput.value = "";
      }

      document.getElementById("btnEntrata").addEventListener("click", () => {
        inserisciTimbratura(pinInput.value, "entrata");
      });

      document.getElementById("btnUscita").addEventListener("click", () => {
        inserisciTimbratura(pinInput.value, "uscita");
      });
    </script>
  </body>
</html>
