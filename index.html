
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BADGEBOX - Sistema Timbrature</title>
    <style>
      body {
        background-color: #1e293b;
        font-family: Arial, sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .container {
        background-color: #0f172a;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        max-width: 100%;
        text-align: center;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
      }
      h1 {
        margin-bottom: 20px;
        font-size: 2.5rem;
        color: #3b82f6;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      }
      input#pinInput {
        width: 180px;
        margin: 0 auto 20px auto;
        padding: 15px;
        font-size: 28px;
        border-radius: 10px;
        border: 2px solid #374151;
        text-align: center;
        letter-spacing: 8px;
        user-select: none;
        color: #000000;
        background: white;
        transition: border-color 0.3s ease;
      }
      input#pinInput:focus {
        outline: none;
        border-color: #3b82f6;
      }
      #status {
        display: none;
        margin-bottom: 20px;
        background-color: #374151;
        padding: 15px;
        border-radius: 10px;
        min-height: 60px;
        font-weight: bold;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 25px;
        width: 100%;
      }
      button.key {
        background-color: #374151;
        border: 2px solid #4b5563;
        border-radius: 15px;
        color: white;
        font-size: 24px;
        font-weight: bold;
        width: 80px;
        height: 80px;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
      }
      button.key:hover {
        background-color: #4b5563;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      }
      button.key:active {
        transform: translateY(0);
      }
      .actions {
        display: flex;
        justify-content: space-between;
        gap: 15px;
      }
      button.action-btn {
        flex: 1;
        padding: 18px 0;
        border: none;
        border-radius: 12px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
        transition: all 0.3s ease;
        color: white;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      button.action-btn.entrata {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }
      button.action-btn.entrata:hover {
        background: linear-gradient(135deg, #16a34a, #15803d);
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(34, 197, 94, 0.4);
      }
      button.action-btn.uscita {
        background: linear-gradient(135deg, #ef4444, #dc2626);
      }
      button.action-btn.uscita:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(239, 68, 68, 0.4);
      }
      #dataOra {
        margin-bottom: 20px;
        font-weight: bold;
        font-size: 18px;
        color: #94a3b8;
        padding: 10px;
        background-color: #1e293b;
        border-radius: 8px;
        border: 1px solid #374151;
      }
      .admin-link {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #6366f1;
        color: white;
        padding: 12px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }
      .admin-link:hover {
        background-color: #4f46e5;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
      }
      .success {
        background-color: #22c55e !important;
        color: white;
      }
      .error {
        background-color: #ef4444 !important;
        color: white;
      }
      .warning {
        background-color: #f59e0b !important;
        color: white;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      window.supabase = createClient(
        "https://pylfpqitdogatlsndxtf.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bGZwcWl0ZG9nYXRsc25keHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzNzU5OTcsImV4cCI6MjA2Mzk1MTk5N30.GXWmglDP7WcLSozta8UT6Ktd9XzIXSCxC5pJ4oWX3LU"
      );
    </script>
</head>
<body>
    <div class="container">
      <h1>BADGEBOX</h1>
      <div id="dataOra"></div>
      <input
        type="text"
        id="pinInput"
        placeholder="Inserisci PIN"
        readonly
        maxlength="2"
      />
      <div id="status"></div>
      <div class="keypad">
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>
        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>
        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>
        <button class="key">C</button>
        <button class="key">0</button>
        <button class="key">&larr;</button>
      </div>
      <div class="actions">
        <button class="action-btn entrata">Entrata</button>
        <button class="action-btn uscita">Uscita</button>
      </div>
    </div>
    
    <a href="utenti.html" class="admin-link">👤 Admin</a>

    <script>
      const { DateTime } = luxon;
      const pinInput = document.getElementById("pinInput");
      const status = document.getElementById("status");
      const dataOraElement = document.getElementById("dataOra");
      const keys = document.querySelectorAll(".key");
      const entrataBtn = document.querySelector(".action-btn.entrata");
      const uscitaBtn = document.querySelector(".action-btn.uscita");

      function aggiornaDataOra() {
        const ora = DateTime.now().setZone("Europe/Rome");
        dataOraElement.textContent = ora.toFormat("dd/MM/yyyy - HH:mm:ss");
      }

      function mostraStatus(messaggio, tipo = "info", durata = 3000) {
        status.textContent = messaggio;
        status.className = tipo;
        status.style.display = "flex";
        
        setTimeout(() => {
          status.style.display = "none";
        }, durata);
      }

      function pulisciPin() {
        pinInput.value = "";
      }

      keys.forEach((key) => {
        key.addEventListener("click", () => {
          const valore = key.textContent;
          
          if (valore === "C") {
            pulisciPin();
          } else if (valore === "←") {
            pinInput.value = pinInput.value.slice(0, -1);
          } else if (pinInput.value.length < 2) {
            pinInput.value += valore;
          }
        });
      });

      async function verificaUtente(pin) {
        try {
          const { data, error } = await window.supabase
            .from("utenti")
            .select("nome, cognome")
            .eq("pin", pin)
            .single();

          if (error) {
            throw new Error("PIN non trovato");
          }

          return data;
        } catch (error) {
          throw new Error("PIN non valido");
        }
      }

      async function registraTimbratura(pin, tipo) {
        try {
          const utente = await verificaUtente(pin);
          const ora = DateTime.now().setZone("Europe/Rome");
          
          const { error } = await window.supabase
            .from("timbrature")
            .insert([
              {
                tipo: tipo,
                pin: pin,
                nome: utente.nome,
                cognome: utente.cognome,
                data: ora.toISODate(),
                ora: ora.toFormat("HH:mm:ss"),
                giornologico: ora.toISODate()
              }
            ]);

          if (error) {
            throw new Error("Errore durante la registrazione");
          }

          mostraStatus(
            `${tipo.toUpperCase()} registrata per ${utente.nome} ${utente.cognome} alle ${ora.toFormat("HH:mm")}`,
            "success",
            4000
          );
          
          pulisciPin();
        } catch (error) {
          mostraStatus(error.message, "error");
        }
      }

      entrataBtn.addEventListener("click", () => {
        const pin = pinInput.value.trim();
        if (pin.length === 0) {
          mostraStatus("Inserisci il PIN", "warning");
          return;
        }
        registraTimbratura(pin, "entrata");
      });

      uscitaBtn.addEventListener("click", () => {
        const pin = pinInput.value.trim();
        if (pin.length === 0) {
          mostraStatus("Inserisci il PIN", "warning");
          return;
        }
        registraTimbratura(pin, "uscita");
      });

      // Aggiorna l'ora ogni secondo
      aggiornaDataOra();
      setInterval(aggiornaDataOra, 1000);

      // Focus automatico sull'input PIN (per accessibilità)
      pinInput.focus();
    </script>
</body>
</html>
