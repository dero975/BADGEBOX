
<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storico Timbrature</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        color: white;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: rgba(30, 58, 138, 0.3);
        border-radius: 20px;
        padding: 40px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5rem;
        font-weight: 300;
        color: white;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .info-utente {
        background: rgba(30, 58, 138, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 30px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .info-utente h2 {
        margin: 0 0 10px 0;
        font-size: 1.8rem;
        font-weight: 400;
        color: white;
      }

      .info-utente p {
        margin: 0;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .filtri {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-bottom: 30px;
        flex-wrap: wrap;
        background: rgba(30, 58, 138, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 15px;
      }

      .filtri label {
        color: white;
        font-weight: 500;
      }

      .filtri input {
        padding: 10px 15px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 14px;
        backdrop-filter: blur(5px);
      }

      .filtri input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      .filtri button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .filtri button:hover {
        background: #2563eb;
        transform: translateY(-2px);
      }

      .table-container {
        background: rgba(30, 58, 138, 0.4);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(30, 58, 138, 0.6);
      }

      th {
        padding: 20px 15px;
        text-align: center;
        font-weight: 500;
        font-size: 16px;
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      tbody tr {
        background: rgba(30, 58, 138, 0.2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: background-color 0.3s ease;
      }

      tbody tr:hover {
        background: rgba(30, 58, 138, 0.4);
      }

      td {
        padding: 18px 15px;
        text-align: center;
        color: white;
        font-size: 14px;
      }

      .entrata {
        background: rgba(34, 197, 94, 0.3) !important;
        color: #86efac !important;
        font-weight: 600;
        border-radius: 6px;
        margin: 0 5px;
        padding: 5px 10px;
        display: inline-block;
      }

      .uscita {
        background: rgba(239, 68, 68, 0.3) !important;
        color: #fca5a5 !important;
        font-weight: 600;
        border-radius: 6px;
        margin: 0 5px;
        padding: 5px 10px;
        display: inline-block;
      }

      .btn-back {
        display: inline-block;
        margin-bottom: 30px;
        padding: 12px 24px;
        background: rgba(30, 58, 138, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .btn-back:hover {
        background: rgba(30, 58, 138, 0.8);
        transform: translateY(-2px);
      }

      .no-data {
        text-align: center;
        padding: 60px 20px;
        color: rgba(255, 255, 255, 0.7);
        font-style: italic;
        font-size: 1.1rem;
      }

      .loading {
        text-align: center;
        padding: 40px 20px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
      }

      @media (max-width: 768px) {
        .container {
          padding: 20px 15px;
        }
        
        .filtri {
          flex-direction: column;
          align-items: stretch;
        }
        
        .filtri input,
        .filtri button {
          width: 100%;
        }
        
        h1 {
          font-size: 2rem;
        }
        
        th, td {
          padding: 12px 8px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="utenti.html" class="btn-back">← Torna agli Utenti</a>
      
      <h1>Storico Timbrature</h1>
      
      <div class="info-utente" id="info-utente">
        <div class="loading">Caricamento informazioni utente...</div>
      </div>

      <div class="filtri">
        <label>Da:</label>
        <input type="date" id="data-da" />
        <label>A:</label>
        <input type="date" id="data-a" />
        <button onclick="filtraTimbrature()">Filtra</button>
        <button onclick="resetFiltri()">Reset</button>
      </div>

      <div class="table-container" id="contenuto-tabella">
        <div class="loading">Caricamento timbrature...</div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabase = createClient(
        "https://pylfpqitdogatlsndxtf.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bGZwcWl0ZG9nYXRsc25keHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzNzU5OTcsImV4cCI6MjA2Mzk1MTk5N30.GXWmglDP7WcLSozta8UT6Ktd9XzIXSCxC5pJ4oWX3LU"
      );

      // Ottieni il PIN dall'URL
      const urlParams = new URLSearchParams(window.location.search);
      const pin = urlParams.get('pin');

      if (!pin) {
        document.getElementById('contenuto-tabella').innerHTML = 
          '<div class="no-data">PIN non specificato nell\'URL</div>';
      } else {
        caricaInformazioniUtente();
        caricaTimbrature();
      }

      async function caricaInformazioniUtente() {
        try {
          const { data, error } = await supabase
            .from('utenti')
            .select('nome, cognome, email')
            .eq('pin', pin)
            .single();

          if (error || !data) {
            document.getElementById('info-utente').innerHTML = 
              '<div style="color: red;">Utente non trovato</div>';
            return;
          }

          document.getElementById('info-utente').innerHTML = `
            <h2>${data.nome} ${data.cognome}</h2>
            <p><strong>PIN:</strong> ${pin.padStart(2, '0')} | <strong>Email:</strong> ${data.email}</p>
          `;
        } catch (error) {
          console.error('Errore caricamento utente:', error);
          document.getElementById('info-utente').innerHTML = 
            '<div style="color: red;">Errore nel caricamento delle informazioni utente</div>';
        }
      }

      async function caricaTimbrature(dataInizio = null, dataFine = null) {
        try {
          let query = supabase
            .from('timbrature')
            .select('*')
            .eq('pin', pin)
            .order('data', { ascending: false })
            .order('ore', { ascending: false });

          if (dataInizio) {
            query = query.gte('data', dataInizio);
          }
          if (dataFine) {
            query = query.lte('data', dataFine);
          }

          const { data, error } = await query;

          if (error) {
            console.error('Errore caricamento timbrature:', error);
            document.getElementById('contenuto-tabella').innerHTML = 
              '<div class="no-data" style="color: red;">Errore nel caricamento delle timbrature</div>';
            return;
          }

          if (!data || data.length === 0) {
            document.getElementById('contenuto-tabella').innerHTML = 
              '<div class="no-data">Nessuna timbratura trovata per questo utente</div>';
            return;
          }

          // Crea la tabella
          let tabella = `
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Orario</th>
                  <th>Tipo</th>
                  <th>Giorno Logico</th>
                </tr>
              </thead>
              <tbody>
          `;

          data.forEach(timbratura => {
            const dataFormattata = new Date(timbratura.data).toLocaleDateString('it-IT');
            const giornoLogicoFormattato = timbratura.giornologico ? 
              new Date(timbratura.giornologico).toLocaleDateString('it-IT') : 'N/A';
            
            tabella += `
              <tr>
                <td>${dataFormattata}</td>
                <td>${timbratura.ore}</td>
                <td class="${timbratura.tipo}">${timbratura.tipo.toUpperCase()}</td>
                <td>${giornoLogicoFormattato}</td>
              </tr>
            `;
          });

          tabella += `
              </tbody>
            </table>
          `;

          document.getElementById('contenuto-tabella').innerHTML = tabella;

        } catch (error) {
          console.error('Errore:', error);
          document.getElementById('contenuto-tabella').innerHTML = 
            '<div class="no-data" style="color: red;">Errore nel caricamento delle timbrature</div>';
        }
      }

      window.filtraTimbrature = function() {
        const dataDa = document.getElementById('data-da').value;
        const dataA = document.getElementById('data-a').value;
        caricaTimbrature(dataDa || null, dataA || null);
      };

      window.resetFiltri = function() {
        document.getElementById('data-da').value = '';
        document.getElementById('data-a').value = '';
        caricaTimbrature();
      };

      // Imposta la data di oggi come default per il filtro "A"
      document.getElementById('data-a').value = new Date().toISOString().split('T')[0];
      
      // Imposta 30 giorni fa come default per il filtro "Da"
      const trentaGiorniFa = new Date();
      trentaGiorniFa.setDate(trentaGiorniFa.getDate() - 30);
      document.getElementById('data-da').value = trentaGiorniFa.toISOString().split('T')[0];
    </script>
  </body>
</html>
