<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storico Timbrature</title>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .titolo-piccolo {
      font-size: 16px;
      color: #94a3b8;
      margin: 0;
    }
    .titolo-grande {
      font-size: 32px;
      color: white;
      margin: 10px 0 30px 0;
      font-weight: bold;
    }
    .filtro-temporale {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .filtro-temporale select {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #374151;
      background-color: white;
      color: black;
      font-size: 14px;
      min-width: 150px;
    }
    .data-container {
      position: relative;
      display: flex;
      align-items: center;
    }
    .data-container input[type="date"] {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #374151;
      background-color: white;
      color: black;
      font-size: 14px;
      min-width: 150px;
    }
    .icona-calendario-campo {
      position: absolute;
      right: 8px;
      width: 20px;
      height: 20px;
      cursor: pointer;
      pointer-events: none;
    }
    .tabella-wrapper {
      background-color: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #1e293b;
    }
    table th,
    table td {
      text-align: center;
      padding: 14px 12px;
      border-bottom: 1px solid #374151;
      color: white;
    }
    table th {
      background-color: #1e293b;
      font-weight: 600;
      font-size: 15px;
    }
    table tr:last-child td {
      border-bottom: none;
    }
    table td button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin: 0 2px;
    }
    .pulsanti-basso {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .pulsanti-basso button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      font-weight: 700;
      font-size: 14px;
      color: #222;
      background: #ddd;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 12px 16px;
    }
    .pulsanti-basso button:hover {
      background: #1e90ff;
      color: white;
    }
    .pulsanti-basso button img {
      width: 24px;
      height: 24px;
    }
    .totale-ore {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      padding: 15px;
      background-color: #1e293b;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="position: relative; text-align: center; margin-bottom: 20px;">
      <img src="assets/icons/logo bb disegno.png" alt="BadgeBox Logo" style="position: absolute; top: -10px; right: 0; width: 100px; height: auto;" />
      <p class="titolo-piccolo">Storico Timbrature</p>
      <h1 id="intestazione" class="titolo-grande">Nome Cognome</h1>
    </div>

    <div class="filtro-temporale">
      <select id="filtro-mese">
        <option value="corrente">Mese corrente</option>
        <option value="precedente">Mese precedente</option>
      </select>
      <div class="data-container">
        <input type="date" id="data-inizio" />
        <img src="assets/icons/calendario.png" class="icona-calendario-campo" alt="Calendario" onclick="document.getElementById('data-inizio').showPicker()" />
      </div>
      <div class="data-container">
        <input type="date" id="data-fine" />
        <img src="assets/icons/calendario.png" class="icona-calendario-campo" alt="Calendario" onclick="document.getElementById('data-fine').showPicker()" />
      </div>
    </div>

    <div class="tabella-wrapper">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Entrata</th>
            <th>Uscita</th>
            <th>Ore</th>
            <th>Modifica</th>
          </tr>
        </thead>
        <tbody id="tabella-storico"></tbody>
      </table>
    </div>

    <div class="totale-ore">
      <div id="totale-mensile">Totale ore mensili: 0:00</div>
    </div>

    <div class="pulsanti-basso">
      <button onclick="window.location.href='index.html'">
        <img src="assets/icons/Logo bb.png" alt="Home" />
        Torna
      </button>
      <button onclick="esportaCSV()">
        <img src="assets/icons/esporta.png" alt="Esporta" />
        Esporta CSV
      </button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://pylfpqitdogatlsndxtf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bGZwcWl0ZG9nYXRsc25keHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzNzU5OTcsImV4cCI6MjA2Mzk1MTk5N30.GXWmglDP7WcLSozta8UT6Ktd9XzIXSCxC5pJ4oWX3LU"
    );

    const urlParams = new URLSearchParams(window.location.search);
    const pinUtente = urlParams.get('pin');

    let utenteCorrente = null;
    let timbrature = [];
    let totaleMensileOre = 0;

    async function caricaUtente() {
      if (!pinUtente) {
        alert('PIN non specificato nella URL');
        window.location.href = 'utenti.html';
        return;
      }

      try {
        const { data, error } = await supabase
          .from('utenti')
          .select('*')
          .eq('pin', pinUtente)
          .single();

        if (error) throw error;

        utenteCorrente = data;
        document.getElementById('intestazione').textContent = `${data.nome} ${data.cognome}`;

        await caricaTimbrature();
      } catch (error) {
        console.error('Errore caricamento utente:', error);
        alert('Utente non trovato');
        window.location.href = 'utenti.html';
      }
    }

    async function caricaTimbrature() {
      try {
        const { data, error } = await supabase
          .from('timbrature')
          .select('*')
          .eq('pin', pinUtente)
          .order('giornologico', { ascending: false });

        if (error) throw error;

        timbrature = data || [];
        applicaFiltro();
      } catch (error) {
        console.error('Errore caricamento timbrature:', error);
        alert('Errore nel caricamento delle timbrature');
      }
    }

    function applicaFiltro() {
      const filtroMese = document.getElementById('filtro-mese').value;
      const dataInizio = document.getElementById('data-inizio').value;
      const dataFine = document.getElementById('data-fine').value;

      let dataInizioPeriodo, dataFinePeriodo;
      const oggi = new Date();

      if (filtroMese === 'corrente') {
        dataInizioPeriodo = new Date(oggi.getFullYear(), oggi.getMonth(), 1);
        dataFinePeriodo = new Date(oggi.getFullYear(), oggi.getMonth() + 1, 0);
      } else if (filtroMese === 'precedente') {
        dataInizioPeriodo = new Date(oggi.getFullYear(), oggi.getMonth() - 1, 1);
        dataFinePeriodo = new Date(oggi.getFullYear(), oggi.getMonth(), 0);
      }

      if (dataInizio) dataInizioPeriodo = new Date(dataInizio);
      if (dataFine) dataFinePeriodo = new Date(dataFine);

      const timbratareFiltrate = timbrature.filter(t => {
        if (!t.giornologico) return false;
        const dataTimbratura = new Date(t.giornologico);
        return dataTimbratura >= dataInizioPeriodo && dataTimbratura <= dataFinePeriodo;
      });

      popolaTabella(timbratareFiltrate, dataInizioPeriodo, dataFinePeriodo);
    }

    function popolaTabella(timbratareFiltrate, dataInizio, dataFine) {
      const tbody = document.getElementById('tabella-storico');
      tbody.innerHTML = '';
      totaleMensileOre = 0;

      const giorniPeriodo = [];
      for (let d = new Date(dataInizio); d <= dataFine; d.setDate(d.getDate() + 1)) {
        giorniPeriodo.push(new Date(d));
      }

      giorniPeriodo.forEach(giorno => {
        const dataISO = giorno.toISOString().split('T')[0];
        const giornoSettimana = giorno.toLocaleDateString('it-IT', { weekday: 'short' });

        const timbratureOggi = timbratareFiltrate.filter(t => {
          if (!t.giornologico) return false;
          let gLogico = t.giornologico;
          if (typeof gLogico !== "string") {
            gLogico = new Date(gLogico).toISOString().split("T")[0];
          }
          return gLogico === dataISO;
        });

        const timbraturaEntrata = timbratureOggi.find(t => t.tipo === "entrata") || null;
        const timbraturaUscita = timbratureOggi.find(t => t.tipo === "uscita") || null;

        let oreLavorate = "—";
        if (timbraturaEntrata && timbraturaUscita) {
          const oraEntrata = timbraturaEntrata.ore;
          const oraUscita = timbraturaUscita.ore;

          if (oraEntrata && oraUscita) {
            const inizio = new Date(`1970-01-01T${oraEntrata}`);
            const fine = new Date(`1970-01-01T${oraUscita}`);
            if (fine < inizio) fine.setDate(fine.getDate() + 1);
            const diffMs = fine - inizio;
            const h = Math.floor(diffMs / (1000 * 60 * 60));
            const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            oreLavorate = `${h}:${m.toString().padStart(2, '0')}`;
            totaleMensileOre += h + m / 60;
          }
        }

        const riga = document.createElement("tr");
        const oraEntrataDisplay = timbraturaEntrata && timbraturaEntrata.ore ? timbraturaEntrata.ore.slice(0,5) : '—';
        const oraUscitaDisplay = timbraturaUscita && timbraturaUscita.ore ? timbraturaUscita.ore.slice(0,5) : '—';

        riga.innerHTML = `
          <td>${giorno.toLocaleDateString('it-IT')} ${giornoSettimana}</td>
          <td>${oraEntrataDisplay}</td>
          <td>${oraUscitaDisplay}</td>
          <td>${oreLavorate}</td>
          <td>
            <button onclick="modificaTimbratura('${dataISO}', 'entrata')" title="Modifica entrata">✏️</button>
            <button onclick="modificaTimbratura('${dataISO}', 'uscita')" title="Modifica uscita">✏️</button>
          </td>
        `;
        tbody.appendChild(riga);
      });

      const h = Math.floor(totaleMensileOre);
      const m = Math.round((totaleMensileOre - h) * 60);
      document.getElementById('totale-mensile').textContent = 
        `Totale ore mensili: ${h}:${m.toString().padStart(2, '0')}`;
    }

    window.modificaTimbratura = function(data, tipo) {
      const nuovaOra = prompt(`Inserisci ${tipo} per ${data} (formato HH:MM):`);
      if (!nuovaOra) return;

      if (!/^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(nuovaOra)) {
        alert('Formato ora non valido. Usa HH:MM');
        return;
      }

      salvaTimbratura(data, tipo, nuovaOra);
    };

    async function salvaTimbratura(data, tipo, ora) {
      try {
        // Verifica se esiste già una timbratura per questo giorno e tipo
        const { data: esistente, error: errorVerifica } = await supabase
          .from('timbrature')
          .select('*')
          .eq('pin', pinUtente)
          .eq('giornologico', data)
          .eq('tipo', tipo)
          .single();

        if (errorVerifica && errorVerifica.code !== 'PGRST116') {
          throw errorVerifica;
        }

        const datiTimbratura = {
          tipo: tipo,
          pin: pinUtente,
          nome: utenteCorrente.nome,
          cognome: utenteCorrente.cognome,
          data: data,
          ore: ora + ':00',
          giornologico: data
        };

        if (esistente) {
          // Aggiorna record esistente
          const { error } = await supabase
            .from('timbrature')
            .update(datiTimbratura)
            .eq('id', esistente.id);

          if (error) throw error;
        } else {
          // Inserisci nuovo record
          const { error } = await supabase
            .from('timbrature')
            .insert([datiTimbratura]);

          if (error) throw error;
        }

        await caricaTimbrature();
      } catch (error) {
        console.error('Errore salvataggio timbratura:', error);
        alert('Errore nel salvataggio: ' + error.message);
      }
    }

    window.esportaCSV = function() {
      if (!timbrature.length) {
        alert('Nessun dato da esportare');
        return;
      }

      let csv = 'Data,Entrata,Uscita,Ore Lavorate\n';

      const tbody = document.getElementById('tabella-storico');
      const righe = tbody.querySelectorAll('tr');

      righe.forEach(riga => {
        const celle = riga.querySelectorAll('td');
        if (celle.length >= 4) {
          const data = celle[0].textContent;
          const entrata = celle[1].textContent;
          const uscita = celle[2].textContent;
          const ore = celle[3].textContent;
          csv += `"${data}","${entrata}","${uscita}","${ore}"\n`;
        }
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', `storico_${utenteCorrente.nome}_${utenteCorrente.cognome}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // Event listeners
    document.getElementById('filtro-mese').addEventListener('change', applicaFiltro);
    document.getElementById('data-inizio').addEventListener('change', applicaFiltro);
    document.getElementById('data-fine').addEventListener('change', applicaFiltro);

    // Inizializza data di default
    const oggi = new Date();
    const primoGiornoMese = new Date(oggi.getFullYear(), oggi.getMonth(), 1);
    const ultimoGiornoMese = new Date(oggi.getFullYear(), oggi.getMonth() + 1, 0);

    document.getElementById('data-inizio').value = primoGiornoMese.toISOString().split('T')[0];
    document.getElementById('data-fine').value = ultimoGiornoMese.toISOString().split('T')[0];

    // Carica i dati
    caricaUtente();
  </script>
</body>
</html>
