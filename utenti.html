
<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio Dipendenti</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: white;
        padding: 40px 20px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: rgba(30, 58, 138, 0.3);
        border-radius: 20px;
        padding: 40px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h1 {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 300;
        margin-bottom: 40px;
        color: white;
      }

      .form-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }

      .form-container input {
        padding: 12px 20px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #333;
        font-size: 14px;
        outline: none;
        min-width: 140px;
      }

      .form-container input::placeholder {
        color: #999;
      }

      #pin {
        min-width: 80px;
      }

      .btn-add {
        padding: 12px 30px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .btn-add:hover {
        background: #2563eb;
      }

      .table-container {
        background: rgba(30, 58, 138, 0.4);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(30, 58, 138, 0.6);
      }

      th {
        padding: 20px 15px;
        text-align: center;
        font-weight: 500;
        font-size: 16px;
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      tbody tr {
        background: rgba(30, 58, 138, 0.2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: background-color 0.3s ease;
      }

      tbody tr:hover {
        background: rgba(30, 58, 138, 0.4);
      }

      td {
        padding: 18px 15px;
        text-align: center;
        color: white;
        font-size: 14px;
      }

      .storico-icon {
        width: 24px;
        height: 24px;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.3s ease;
      }

      .storico-icon:hover {
        opacity: 1;
      }

      .action-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .btn-action {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .btn-edit {
        background: #f59e0b;
        color: white;
      }

      .btn-edit:hover {
        background: #d97706;
        transform: scale(1.1);
      }

      .btn-delete {
        background: #ef4444;
        color: white;
      }

      .btn-delete:hover {
        background: #dc2626;
        transform: scale(1.1);
      }

      @media (max-width: 768px) {
        .container {
          padding: 20px;
        }
        
        .form-container {
          flex-direction: column;
          align-items: stretch;
        }
        
        .form-container input,
        .btn-add {
          width: 100%;
        }
        
        h1 {
          font-size: 2rem;
        }
        
        th, td {
          padding: 12px 8px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Archivio Dipendenti</h1>

      <form id="form-aggiungi" class="form-container">
        <input type="text" id="nome" placeholder="Nome" required />
        <input type="text" id="cognome" placeholder="Cognome" required />
        <input type="text" id="pin" placeholder="PIN" maxlength="2" required />
        <input type="email" id="email" placeholder="Email" required />
        <button type="submit" id="btn-aggiungi" class="btn-add">Aggiungi</button>
      </form>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Storico</th>
              <th>PIN</th>
              <th>Nome</th>
              <th>Cognome</th>
              <th>Email</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="lista-dipendenti"></tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabase = createClient(
        "https://pylfpqitdogatlsndxtf.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bGZwcWl0ZG9nYXRsc25keHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzNzU5OTcsImV4cCI6MjA2Mzk1MTk5N30.GXWmglDP7WcLSozta8UT6Ktd9XzIXSCxC5pJ4oWX3LU",
      );

      const tbody = document.getElementById("lista-dipendenti");
      const form = document.getElementById("form-aggiungi");
      const btn = document.getElementById("btn-aggiungi");

      let idDaModificare = null;

      async function caricaUtenti() {
        const { data, error } = await supabase
          .from("utenti")
          .select("*")
          .order("pin", { ascending: true });
        if (error) {
          alert("Errore durante il caricamento utenti: " + error.message);
          return;
        }

        tbody.innerHTML = "";
        data.forEach((utente) => {
          const riga = document.createElement("tr");

          riga.innerHTML = `
          <td>
            <a href="storico.html?pin=${utente.pin}" title="Storico">
              <img src="assets/icons/orologio.png" alt="Storico" class="storico-icon" />
            </a>
          </td>
          <td>${utente.pin.padStart(2, "0")}</td>
          <td>${utente.nome}</td>
          <td>${utente.cognome}</td>
          <td>${utente.email}</td>
          <td>
            <div class="action-buttons">
              <button type="button" class="btn-action btn-edit" onclick="modificaUtente('${utente.id}', '${utente.nome}', '${utente.cognome}', '${utente.pin}', '${utente.email}')" title="Modifica">✏️</button>
              <button type="button" class="btn-action btn-delete" onclick="eliminaUtente('${utente.id}')" title="Elimina">❌</button>
            </div>
          </td>
        `;
          tbody.appendChild(riga);
        });
      }

      window.modificaUtente = function (id, nome, cognome, pin, email) {
        document.getElementById("nome").value = nome;
        document.getElementById("cognome").value = cognome;
        document.getElementById("pin").value = pin;
        document.getElementById("email").value = email;
        idDaModificare = id;
        btn.textContent = "Salva Modifica";
        btn.classList.add("editing");
      };

      window.eliminaUtente = async function (id) {
        const prima = confirm("Sei sicuro di voler eliminare questo utente?");
        if (!prima) return;

        const seconda = confirm(
          "ATTENZIONE: questa operazione è irreversibile.\nConfermi l'eliminazione definitiva?",
        );
        if (!seconda) return;

        const { error } = await supabase.from("utenti").delete().eq("id", id);
        if (error) {
          alert("Errore durante l'eliminazione: " + error.message);
        } else {
          caricaUtenti();
        }
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const nuovoUtente = {
          nome: document.getElementById("nome").value.trim(),
          cognome: document.getElementById("cognome").value.trim(),
          pin: document.getElementById("pin").value.trim(),
          email: document.getElementById("email").value.trim(),
        };

        if (
          !nuovoUtente.nome ||
          !nuovoUtente.cognome ||
          !nuovoUtente.pin ||
          !nuovoUtente.email
        ) {
          alert("Compila tutti i campi.");
          return;
        }

        if (idDaModificare) {
          const { error } = await supabase
            .from("utenti")
            .update(nuovoUtente)
            .eq("id", idDaModificare);
          if (error) {
            alert("Errore durante la modifica: " + error.message);
            return;
          }
          idDaModificare = null;
          btn.textContent = "Aggiungi";
          btn.classList.remove("editing");
        } else {
          const { error } = await supabase.from("utenti").insert([nuovoUtente]);
          if (error) {
            alert("Errore durante l'inserimento: " + error.message);
            return;
          }
        }

        form.reset();
        caricaUtenti();
      });

      caricaUtenti();
    </script>
  </body>
</html>
